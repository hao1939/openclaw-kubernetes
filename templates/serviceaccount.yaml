{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openclaw.serviceAccountName" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations (and .Values.azureWorkloadIdentity.enabled .Values.azureWorkloadIdentity.clientId) }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.azureWorkloadIdentity.enabled .Values.azureWorkloadIdentity.clientId }}
    azure.workload.identity/client-id: {{ .Values.azureWorkloadIdentity.clientId | quote }}
    {{- end }}
  {{- end }}
{{- end }}
