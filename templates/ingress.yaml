{{- if .Values.ingress.enabled -}}
{{- $fullName := include "openclaw.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $apiVersion := include "openclaw.ingress.apiVersion" . -}}
{{- $supportsPathType := eq (include "openclaw.ingress.supportsPathType" .) "true" -}}
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  {{- if eq $apiVersion "networking.k8s.io/v1" }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if $supportsPathType }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              {{- if eq $apiVersion "networking.k8s.io/v1" }}
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
              {{- else }}
              serviceName: {{ $fullName }}
              servicePort: {{ $svcPort }}
              {{- end }}
          {{- end }}
    {{- end }}
---
{{- if .Values.novnc.ingress.enabled }}
# noVNC web assets: /vnc/* -> rewrite to /* on port 6080
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  name: {{ $fullName }}-novnc-web
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  {{- if .Values.ingress.className }}
  {{- if eq $apiVersion "networking.k8s.io/v1" }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ $.Values.novnc.ingress.pathPrefix }}/(.*)
            {{- if $supportsPathType }}
            pathType: ImplementationSpecific
            {{- end }}
            backend:
              {{- if eq $apiVersion "networking.k8s.io/v1" }}
              service:
                name: {{ $fullName }}
                port:
                  number: 6080
              {{- else }}
              serviceName: {{ $fullName }}
              servicePort: 6080
              {{- end }}
    {{- end }}
---
# WebSocket endpoint: /websockify -> port 6080 (no rewrite)
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  name: {{ $fullName }}-novnc-ws
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  {{- if eq $apiVersion "networking.k8s.io/v1" }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /websockify
            {{- if $supportsPathType }}
            pathType: Prefix
            {{- end }}
            backend:
              {{- if eq $apiVersion "networking.k8s.io/v1" }}
              service:
                name: {{ $fullName }}
                port:
                  number: 6080
              {{- else }}
              serviceName: {{ $fullName }}
              servicePort: 6080
              {{- end }}
    {{- end }}
{{- end }}
{{- if and .Values.ttyd.enabled .Values.ttyd.ingress.enabled }}
---
# ttyd web terminal: /ttyd/* -> port 7681 (no rewrite needed, ttyd uses --base-path)
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  name: {{ $fullName }}-ttyd
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  {{- if eq $apiVersion "networking.k8s.io/v1" }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ $.Values.ttyd.ingress.pathPrefix }}
            {{- if $supportsPathType }}
            pathType: Prefix
            {{- end }}
            backend:
              {{- if eq $apiVersion "networking.k8s.io/v1" }}
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $.Values.ttyd.port }}
              {{- else }}
              serviceName: {{ $fullName }}
              servicePort: {{ $.Values.ttyd.port }}
              {{- end }}
    {{- end }}
{{- end }}
{{- end }}
