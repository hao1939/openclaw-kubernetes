name: Helm Lint and Template

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  lint-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Helm
        uses: azure/setup-helm@v5
      - name: Setup chart-testing
        uses: helm/chart-testing-action@v2
      - name: ct lint
        run: ct lint --config ct.yaml
      - name: Helm lint
        run: ./scripts/helm-lint.sh
      - name: Helm template
        run: ./scripts/helm-test.sh
      - name: Install yq
        uses: mikefarah/yq@v4
      - name: Selector isolation
        run: ./scripts/helm-test-selectors.sh
